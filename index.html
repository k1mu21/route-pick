<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Route Pick</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, "Hiragino Kaku Gothic ProN", sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; }
  #panel { width: 380px; overflow-y: auto; padding: 16px; background: #f7f8fa; border-left: 1px solid #ddd; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  .hint { color: #667; font-size: 13px; margin-bottom: 12px; }
  .pin-info { font-size: 13px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
  .pin-info b { display: inline-block; width: 3.5em; }
  button { width: 100%; padding: 10px; font-size: 15px; border: 0; border-radius: 8px; background: #2f6bff; color: #fff; cursor: pointer; margin: 8px 0 16px; }
  button:disabled { background: #aab; cursor: default; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
  .card h3 { margin: 0 0 6px; font-size: 15px; }
  .time { font-size: 13px; color: #445; margin-bottom: 8px; }
  .leg { font-size: 13px; padding: 4px 0 4px 10px; border-left: 4px solid #ccc; margin: 4px 0; }
  .leg .route { font-weight: 600; }
  .walk { color: #888; font-size: 12px; }
  #status { font-size: 13px; color: #a33; min-height: 1.2em; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>🚉 Route Pick</h1>
  <div class="hint">地図をクリックして出発ピン → 到着ピンの順に設置。各ピンの最寄り駅間の電車経路を3通り表示します。</div>
  <div class="pin-info"><b>出発:</b> <span id="fromTxt">未設定</span><br /><b>最寄駅:</b> <span id="fromSta">-</span></div>
  <div class="pin-info"><b>到着:</b> <span id="toTxt">未設定</span><br /><b>最寄駅:</b> <span id="toSta">-</span></div>
  <button id="searchBtn" disabled>経路を検索</button>
  <div id="status"></div>
  <div id="results"></div>
</div>
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<script>
const API = "https://api.transit.ls8h.com/api/v1";
// PMTilesの、MapLibre GL JS用のプロトコルをグローバルに追加
let protocol = new pmtiles.Protocol();
// addProtocolで、カスタムURLスキーマを使用するときに呼び出される関数を追加する
// pmtiles://~~ が使用されたときに、protocol.tileが呼び出される
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
  container: "map",
  center: [139.7024, 35.6598], // 中心座標
  zoom: 16, // ズームレベル
  maxPitch: 85, // 最大の傾き、デフォルトは60
  style: {
    // スタイル仕様のバージョン番号。8を指定する
    version: 8,
    // データソース
    sources: {
      // 背景地図 OpenStreetMapのラスタタイル
      "background-osm-raster": {
        // ソースの種類。vector、raster、raster-dem、geojson、image、video のいずれか
        type: "raster",
        // タイルソースのURL
        tiles: ["https://tile.openstreetmap.jp/styles/osm-bright-ja/{z}/{x}/{y}.png"],
        // タイルの解像度。単位はピクセル、デフォルトは512
        tileSize: 256,
        // データの帰属
        attribution: "<a href='https://www.openstreetmap.org/copyright' target='_blank'>© OpenStreetMap contributors</a>",
      },
      // 地形データ
      "aws-terrain": {
        type: "raster-dem",
        // タイルが利用可能な最小ズームレベル
        minzoom: 1,
        // タイルが利用可能な最大ズームレベル
        maxzoom: 15,
        // このソースが使用するエンコーディング。terrarium（Terrarium形式のPNGタイル）、mapbox（Mapbox Terrain RGBタイル）、custom のいずれか
        encoding: "terrarium",
        tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
        attribution:
          // see 'https://github.com/tilezen/joerd/blob/master/docs/attribution.md'
          "\
          ArcticDEM terrain data DEM(s) were created from DigitalGlobe, Inc., imagery and funded under National Science Foundation awards 1043681, 1559691, and 1542736; \
          Australia terrain data © Commonwealth of Australia (Geoscience Australia) 2017;\
          Austria terrain data © offene Daten Österreichs – Digitales Geländemodell (DGM) Österreich;\
          Canada terrain data contains information licensed under the Open Government Licence – Canada;\
          Europe terrain data produced using Copernicus data and information funded by the European Union - EU-DEM layers;\
          Global ETOPO1 terrain data U.S. National Oceanic and Atmospheric Administration\
          Mexico terrain data source: INEGI, Continental relief, 2016;\
          New Zealand terrain data Copyright 2011 Crown copyright (c) Land Information New Zealand and the New Zealand Government (All rights reserved);\
          Norway terrain data © Kartverket;\
          United Kingdom terrain data © Environment Agency copyright and/or database right 2015. All rights reserved;\
          United States 3DEP (formerly NED) and global GMTED2010 and SRTM terrain data courtesy of the U.S. Geological Survey.",
      },
      // 登記所備付地図
      "amx-a-pmtiles": {
        type: "vector",
        // タイルが利用可能な最小ズームレベル
        minzoom: 2,
        // タイルが利用可能な最大ズームレベル
        maxzoom: 16,
        // リソースへのURL
        url: "pmtiles://https://habs.rad.naro.go.jp/spatial_data/amx/a.pmtiles",
        attribution: "<a href='https://www.moj.go.jp/MINJI/minji05_00494.html' target='_blank'>登記所備付地図データ（法務省）</a>",
      },
      // 3D都市モデル（Project PLATEAU）東京都23区（2020年度）建物データ
      "plateau-bldg": {
        type: "vector",
        tiles: ["https://indigo-lab.github.io/plateau-lod2-mvt/{z}/{x}/{y}.pbf"],
        minzoom: 10,
        maxzoom: 16,
        attribution: "<a href='https://github.com/indigo-lab/plateau-lod2-mvt'>plateau-lod2-mvt by indigo-lab</a> (<a href='https://www.mlit.go.jp/plateau/'>国土交通省 Project PLATEAU</a> のデータを加工して作成)",
      },
    },
    // 表示するレイヤ
    layers: [
      // 背景地図としてOpenStreetMapのラスタタイルを追加
      {
        // 一意のレイヤID
        id: "background-osm-raster",
        // レイヤの種類。background、fill、line、symbol、raster、circle、fill-extrusion、heatmap、hillshade のいずれか
        type: "raster",
        // データソースの指定
        source: "background-osm-raster",
      },
      // 陰影起伏
      {
        id: "hills",
        type: "hillshade",
        source: "aws-terrain",
      },

      // 登記所備付地図データ 間引きなし
      {
        id: "amx-a-fude-polygon",
        // 塗りつぶされたポリゴン
        type: "fill",
        source: "amx-a-pmtiles",
        // ベクトルタイルソースから使用するレイヤ
        "source-layer": "fude",
        paint: {
          // 塗りつぶし部分の色
          "fill-color": "rgba(254, 217, 192, 1)",
          // 塗りつぶしの輪郭の色
          "fill-outline-color": "rgba(255, 0, 0, 1)",
          // 塗りつぶしの不透明度 1に近づくほど不透明になる
          "fill-opacity": 0.4,
        },
      },
      // 登記所備付地図データ 間引きなし
      // NOTE: 3D Terrainを表示すると、fill-outline-colorが効かない不具合が起きる
      // そのため、lineレイヤを追加する
      {
        id: "amx-a-fude-line",
        // 塗りつぶされたポリゴン
        type: "line",
        source: "amx-a-pmtiles",
        // ベクトルタイルソースから使用するレイヤ
        "source-layer": "fude",
        paint: {
          "line-color": "rgba(255, 0, 0, 1)",
          "line-width": 0.1,
        },
      },
      // 登記所備付地図データ 代表点レイヤ
      {
        id: "amx-a-daihyo",
        // ヒートマップ
        type: "heatmap",
        source: "amx-a-pmtiles",
        // ベクトルタイルソースから使用するレイヤ
        "source-layer": "daihyo",
        paint: {
          // ヒートマップの密度に基づいて各ピクセルの色を定義
          "heatmap-color": [
            // 入力値と出力値のペア（"stop"）の間を補間することにより、連続的で滑らかな結果を生成する
            "interpolate",
            // 入力より小さいストップと大きいストップのペアを直線的に補間
            ["linear"],
            // ヒートマップレイヤーの密度推定値を取得
            ["heatmap-density"],
            0,
            "rgba(255, 255, 255, 0)",
            0.5,
            "rgba(255, 255, 0, 0.5)",
            // 1に近づくほど密度が高い
            1,
            "rgba(255, 0, 0, 0.5)",
          ],
          // ヒートマップ1点の半径（ピクセル単位）
          "heatmap-radius": [
            // 入力値と出力値のペア（"stop"）の間を補間することにより、連続的で滑らかな結果を生成する
            "interpolate",
            // 出力が増加する割合を制御する、1に近づくほど出力が増加する
            ["exponential", 10],
            // ズームレベルに応じて半径を調整する
            ["zoom"],
            2,
            5,
            14,
            50,
          ],
        },
      },
      // PLATEAU 建物データ
      {
        id: "bldg",
        type: "fill-extrusion",
        source: "plateau-bldg",
        // ベクタタイルソースから使用するレイヤ
        "source-layer": "bldg",
        paint: {
          // 高さ
          "fill-extrusion-height": ["*", ["get", "z"], 1],
          // 塗りつぶしの色
          "fill-extrusion-color": "#797979",
          // 透明度
          "fill-extrusion-opacity": 0.7,
        },
      },
    ],
    // 地形
    terrain: {
      // 地形データのソース
      source: "aws-terrain",
      // 標高の誇張度
      exaggeration: 1,
    },
    sky: {
      // 空のベースカラー
      "sky-color": "#199EF3",
      // 空の色と水平線の色の混ぜ合わせ。1は空の真ん中の色を、0は空の色を使用する
      "sky-horizon-blend": 0.5,
      // 地平線のベースカラー
      "horizon-color": "#ffffff",
      // 霧の色と水平線の色の混ぜ合わせ。0は水平線の色、1は霧の色を使用する
      "horizon-fog-blend": 0.5,
      // 霧のベースカラー。 3D地形が必要
      "fog-color": "#0000ff",
      // 3D地形に霧を混ぜ合わせる。 0はマップの中心、1は地平線
      "fog-ground-blend": 0.5,
      // 大気の混ぜ合わせ。 1が可視大気、0が非表示大気
      "atmosphere-blend": ["interpolate", ["linear"], ["zoom"], 0, 1, 10, 1, 12, 0],
    },
  },
});

/**
 * チェックボックスのオンオフを元に、レイヤの表示/非表示を切り替えます
 * @param {*} checkbox
 */
function changeLayerVisibility(checkbox) {
  if (checkbox.checked) {
    // チェックボックスのチェックがついた場合、レイヤを表示する
    map.setLayoutProperty(checkbox.id, "visibility", "visible");
  } else {
    // チェックボックスのチェックが外れた場合、レイヤを非表示にする
    map.setLayoutProperty(checkbox.id, "visibility", "none");
  }
}

const state = { from: null, to: null, next: "from" };
const markers = { from: null, to: null, fromSta: null, toSta: null };

function staElement(name) {
  const el = document.createElement("div");
  el.textContent = "🚉";
  el.style.fontSize = "22px";
  el.title = "最寄駅: " + name;
  return el;
}

map.on("click", (e) => {
  const key = state.next;
  const { lat, lng } = e.lngLat;
  state[key] = { lat, lon: lng, station: null };
  if (markers[key]) markers[key].remove();
  if (markers[key + "Sta"]) { markers[key + "Sta"].remove(); markers[key + "Sta"] = null; }
  markers[key] = new maplibregl.Marker({ color: key === "from" ? "#2f6bff" : "#e0433f" })
    .setLngLat([lng, lat])
    .setPopup(new maplibregl.Popup({ offset: 30 }).setText(key === "from" ? "出発" : "到着"))
    .addTo(map);
  markers[key].togglePopup();
  document.getElementById(key + "Txt").textContent = lat.toFixed(5) + ", " + lng.toFixed(5);
  document.getElementById(key + "Sta").textContent = "検索中…";
  state.next = key === "from" ? "to" : "from";
  findStation(key);
});

async function findStation(key) {
  const p = state[key];
  try {
    const r = await fetch(`${API}/places/reverse?lat=${p.lat}&lon=${p.lon}&limit=20&radiusMeters=2000`);
    const d = await r.json();
    const sta = (d.places || []).find((x) => x.kind === "station");
    if (!sta) throw new Error("2km以内に駅なし");
    p.station = sta;
    document.getElementById(key + "Sta").textContent =
      `${sta.name}（${Math.round(sta.distanceMeters)}m）`;
    markers[key + "Sta"] = new maplibregl.Marker({ element: staElement(sta.name) })
      .setLngLat([sta.lon, sta.lat])
      .setPopup(new maplibregl.Popup({ offset: 15 }).setText("最寄駅: " + sta.name))
      .addTo(map);
  } catch (err) {
    document.getElementById(key + "Sta").textContent = "取得失敗: " + err.message;
  }
  document.getElementById("searchBtn").disabled = !(state.from?.station && state.to?.station);
}

function fmtTime(secs) {
  const h = Math.floor(secs / 3600) % 24, m = Math.floor(secs / 60) % 60;
  return `${h}:${String(m).padStart(2, "0")}`;
}
function fmtDur(secs) {
  const m = Math.round(secs / 60);
  return m >= 60 ? `${Math.floor(m / 60)}時間${m % 60}分` : `${m}分`;
}

document.getElementById("searchBtn").onclick = async () => {
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  status.textContent = "";
  results.innerHTML = "検索中…";
  const f = state.from.station, t = state.to.station;
  try {
    const url = `${API}/plan?from=${encodeURIComponent(f.endpoint)}&to=${encodeURIComponent(t.endpoint)}` +
      `&fromLabel=${encodeURIComponent(f.name)}&toLabel=${encodeURIComponent(t.name)}` +
      `&allowModes=rail&numItineraries=3`;
    const r = await fetch(url);
    if (!r.ok) throw new Error("API error " + r.status);
    const d = await r.json();
    const journeys = (d.journeys || []).slice(0, 3);
    if (!journeys.length) { results.innerHTML = "経路が見つかりませんでした。"; return; }
    results.innerHTML = journeys.map((j, i) => `
      <div class="card">
        <h3>ルート${i + 1}　${fmtDur(j.durationSecs)}・乗換${j.transferCount}回</h3>
        <div class="time">${fmtTime(j.departureSecs)} 発 → ${fmtTime(j.arrivalSecs)} 着</div>
        ${j.legs.map((l) => l.kind === "transit" ? `
          <div class="leg" style="border-color:#${l.color || "999"}">
            <span class="route">${l.routeName}</span> ${l.headsign ? "（" + l.headsign + "）" : ""}<br />
            ${l.from.name} ${fmtTime(l.departureSecs)} → ${l.to.name} ${fmtTime(l.arrivalSecs)}
          </div>` : `
          <div class="leg walk">🚶 徒歩 ${fmtDur(l.durationSecs || (l.arrivalSecs - l.departureSecs))}</div>`
        ).join("")}
      </div>`).join("");
  } catch (err) {
    results.innerHTML = "";
    status.textContent = "検索失敗: " + err.message;
  }
};
</script>
</body>
</html>
