name: Cloud Run PR Preview

on:
  pull_request:
    branches: [main]
    # closed はプレビュー掃除用
    types: [opened, synchronize, reopened, closed]

env:
  SERVICE: route-pick
  REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'route-pick-501614' }}
  PREVIEW_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  deploy-preview:
    # フォークからのPRはWIF認証できないので除外
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # プレビューURLはPRのDeployments（View deployment）として表示する
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${SERVICE}/${SERVICE}:${PREVIEW_TAG}-${GITHUB_SHA::7}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # 本番トラフィックには流さず、リビジョンタグ付きのプレビューURLだけを発行する
      - name: Deploy preview revision
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          tag: ${{ env.PREVIEW_TAG }}
          no_traffic: true
          flags: --allow-unauthenticated --port=8080

  cleanup-preview:
    # PRクローズ時にプレビュータグを外す（タグが無ければ何もしない）
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Remove preview tag
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --remove-tags "$PREVIEW_TAG" || echo "tag not found; skipping"
